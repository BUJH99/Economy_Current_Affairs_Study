<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 기초 및 거시경제 지표 완전 정복</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap">
    <link rel="stylesheet" href="../assets/css/econ-academy.css">
</head>
<body>


<div id="app"></div>

<template id="lecture-view-tpl">
<div class="app-container" style="background: #ffffff; width: 100%;">
        <nav class="sidebar" id="sidebar">
            <div @click="$emit('go-home')" class="sidebar-btn-home" style="cursor:pointer; color:var(--color-blue); font-weight:bold; margin-bottom:1rem;">
                ← 홈으로 돌아가기
            </div>
            <div class="sidebar-title">주식/경제 마스터</div>
            <div class="toc-list">
                 <div v-for="(item, idx) in toc" :key="idx" :class="['toc-item', {'toc-sub': item.isSub}]">
                     <a @click.prevent="scrollTo(item.id)" :class="{active: activeToc === item.id}">{{ item.text }}</a>
                 </div>
            </div>
        </nav>

        <main class="main-content">
            
        <header>
            <p style="color: var(--color-blue); font-weight: 600; margin-bottom: 0.5rem;">강의 교안</p>
            <h1>주식 및 경제 기초:<br>지표부터 거시경제까지</h1>
            <p>기업 가치 평가, 자금 조달 이벤트, 일본의 잃어버린 30년, 그리고 업종별 사이클 완전 정복</p>
        </header>

        <article id="part1">
            <h2>Part 1: 기업 가치 평가 지표</h2>
            <p>투자의 기본은 기업의 가격(Price)과 가치(Value)를 비교하는 것입니다. 핵심 지표 5가지를 통해 저평가와 고평가를 판단하는 기준을 배웁니다.</p>

            <valuation-table></valuation-table>

            <section id="p1-1">
                <h3>1. PER (Price Earning Ratio, 주가수익비율)</h3>
                <p>기업의 현재 주가가 1주당 벌어들이는 순이익의 몇 배인지를 나타내는 지표. 투자 원금을 해당 기업의 이익으로 회수하는 데 걸리는 기간(년)을 의미함.</p>
                <div class="metric-grid">
                    <div class="metric-card">
                        <span class="metric-label">Formula</span>
                        <div class="formula-box" style="margin:0; background:transparent; padding:0; text-align:left;">Price ÷ EPS</div>
                        <span class="metric-desc" style="margin-top:10px;">투자 원금을 이익으로 회수하는 데 걸리는 시간(년)</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Forward P/E</span>
                        <span class="metric-value">12개월 선행 PER</span>
                        <span class="metric-desc">과거 실적보다는 미래 전망을 중시. 분모(E)는 애널리스트 실적 전망치 평균인 컨센서스(Consensus)를 적용함.</span>
                    </div>
                </div>
                <div class="card">
                    <strong>💡 해석 기준</strong>
                    <ul>
                        <li><span class="badge badge-neu">가치주</span> 통상 PER 10~15배 미만. 안정적인 수익을 창출하나 폭발적 성장 기대감이 낮아 낮은 프리미엄을 부여받음.</li>
                        <li><span class="badge badge-up">성장주/기술주</span> 통상 PER 20~30배, 혹은 50배 이상. 현재 이익 대비 2~3년 뒤의 막대한 성장성을 선반영하여 높은 프리미엄이 형성됨.</li>
                    </ul>
                </div>
                <indicator-bar id="per"></indicator-bar>
            </section>

            <section id="p1-2">
                <h3>2. PBR (Price Book-value Ratio, 주가순자산비율)</h3>
                <div class="formula-box">PBR = 주가(Price) ÷ 주당순자산(BPS)</div>
                <p>기업의 순자산(총자산-총부채) 대비 현재 주가 수준을 나타내는 지표. 기업 청산 시 주주가 배당받을 수 있는 장부상 가치와 현재 주가를 비교함. <strong>PBR 1배</strong>는 장부가치와 주가가 동일함을 의미.</p>
                <div class="card">
                    <strong>💡 해석 기준</strong>
                    <ul>
                        <li><span class="badge badge-neu">가치주</span> 통상 PBR 1.0배 미만(0.5~0.8). 은행, 철강 등 대규모 유형자산을 보유한 전통 산업군에 주로 해당하며, 청산 가치보다 주가가 낮아 저평가된 것으로 해석함.</li>
                        <li><span class="badge badge-up">성장주/기술주</span> 통상 PBR 3.0~5.0배 이상. 소프트웨어, 빅테크 등은 공장이나 토지(유형자산)보다 기술력, 브랜드 가치(무형자산)가 핵심 가치이므로 PBR이 높게 형성됨.</li>
                    </ul>
                </div>
                <indicator-bar id="pbr"></indicator-bar>
            </section>

            <section id="p1-3">
                <h3>3. ROE (Return On Equity, 자기자본이익률)</h3>
                <div class="formula-box">ROE = (당기순이익 ÷ 자기자본) × 100 (%)</div>
                <p>주주가 투자한 자본(자기자본)을 활용하여 연간 어느 정도의 순이익을 창출했는지를 백분율(%)로 나타낸 지표. 기업의 자본 운용 효율성을 의미함.</p>
                <div class="card">
                    <strong>💡 해석 기준</strong>
                    <ul>
                        <li><span class="badge badge-neu">가치주</span> 연간 8~10% 수준을 꾸준히 유지할 경우 우량한 것으로 평가함.</li>
                        <li><span class="badge badge-up">성장주/기술주</span> 연간 15~20% 이상의 높은 ROE가 요구됨. 지속적인 혁신과 재투자를 통해 자본을 빠르게 증식시켜야 함.</li>
                    </ul>
                </div>
                <indicator-bar id="roe"></indicator-bar>
            </section>

            <section id="p1-4">
                <h3>4. EV/EBITDA (기업가치 대비 상각전 영업이익)</h3>
                <div class="formula-box">EV/EBITDA = EV(시가총액 + 순차입금) ÷ EBITDA(영업이익 + 감가상각비 등)</div>
                <p>주로 기업 인수합병(M&A) 시 활용되는 지표로, 기업 전체를 인수할 때 소요되는 자금을 영업 현금흐름으로 회수하는 데 걸리는 기간을 의미함.</p>
                <ul>
                    <li><strong>EV (Enterprise Value):</strong> 시가총액 + 순차입금(총차입금-현금성 자산). 기업을 인수하는 데 필요한 실제 총비용.</li>
                    <li><strong>EBITDA:</strong> 영업이익 + 감가상각비 + 무형자산상각비. 세금, 이자, 회계상 상각비를 제외하기 전의 순수 영업 현금 창출력.</li>
                </ul>
                <div class="callout">
                    <h4>평가 기준</h4>
                    <p>가치주는 통상 8~10배 이하, 성장주/기술주는 15~20배 이상으로 평가됨. 대규모 설비 투자가 수반되어 감가상각비가 큰 인프라, 통신 기업 등의 가치 평가 시 PER보다 유용함.</p>
                </div>
                <indicator-bar id="evebitda"></indicator-bar>
            </section>

            <section id="p1-5">
                <h3>5. PEG (Price Earnings to Growth ratio, 주가수익성장비율)</h3>
                <div class="formula-box">PEG = PER ÷ 주당순이익(EPS) 예상 성장률(%)</div>
                <p>기업의 PER이 이익 성장성에 비해 적정한지를 평가하는 지표. 전설적인 투자자 '피터 린치'가 애용하며 대중화됨.</p>
                <div class="card">
                    <strong>💡 평가 기준 및 활용</strong>
                    <p>통상적으로 PEG가 1이면 적정 가치, 1.0 미만이면 성장성 대비 저평가(매수 관점), 1.5 이상이면 고평가로 해석함.</p>
                    <p><strong>활용 (성장주/기술주):</strong> PER 수치만 보면 50배, 100배로 비싸 보이는 기술주라도, 매년 이익이 50%, 100%씩 폭발적으로 성장하고 있다면 PEG 지표상으로는 저렴하다고 판단할 수 있게 해주는 핵심 지표임.</p>
                </div>
                <indicator-bar id="peg"></indicator-bar>
            </section>
        </article>

        <article id="part2">
            <h2>Part 2: 기업의 자금 조달 이벤트와 주가 영향</h2>
            
            <section id="p2-1">
                <h3>1. CB (Convertible Bond, 전환사채)</h3>
                <p style="color:var(--text-secondary); margin-bottom:1.5rem;">채권(안전성)과 주식(수익성)의 장점을 섞은 하이브리드 투자 상품입니다. 채권으로 이자를 받다가, <strong>원할 때 주식으로 바꿀 수 있는 권리</strong>가 있습니다.</p>

                <div style="background:#f8f9fa; border:1px solid #e2e8f0; border-radius:var(--radius-lg); padding:2rem; margin-bottom:3rem;">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:1.5rem;">
                        <span style="background:var(--color-blue); color:#fff; font-size:0.8rem; font-weight:700; padding:4px 10px; border-radius:20px;">시나리오</span>
                        <strong style="color:var(--text-primary); font-size:1.1rem;">A기업(돈이 필요함)과 B투자자(안전+대박을 원함)의 계약</strong>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:1.5rem; align-items:stretch;">
                        <!-- 투자 시점 -->
                        <div style="background:#fff; border:1px solid #cbd5e1; border-radius:var(--radius-md); padding:1.5rem; text-align:center; box-shadow:var(--shadow-sm);">
                            <div style="font-weight:800; color:var(--text-primary); margin-bottom:1rem; font-size:1.1rem;">[ 투자 시점 ]</div>
                            <div style="font-size:2rem; margin-bottom:0.5rem;">🤝</div>
                            <p style="font-size:0.95rem; color:var(--text-secondary); word-break:keep-all; line-height:1.5; margin:0;">
                                B투자자가 A기업에 <strong>1억 원을 대출</strong>해줌.<br>A기업은 "매년 이자 2% 주고, 1년 뒤 원하면 우리 <strong>주식(1주당 1만원)으로 바꿀 수 있게</strong> 해줄게!" 약속.
                            </p>
                        </div>
                        
                        <!-- 화살표 -->
                        <div style="display:flex; flex-direction:column; justify-content:center; color:#94a3b8; font-size:1.5rem;">
                            ➔
                        </div>

                        <!-- 1년 후 결과 -->
                        <div style="display:flex; flex-direction:column; gap:1rem;">
                            <!-- 주가 하락 시 -->
                            <div style="background:#fffcfc; border:1px solid #fecaca; border-radius:var(--radius-md); padding:1rem 1.2rem; display:flex; gap:1rem; align-items:center;">
                                <div style="font-size:1.8rem;">📉</div>
                                <div>
                                    <div style="font-weight:700; color:var(--color-red); font-size:0.9rem; margin-bottom:4px;">A기업 주가 폭락 (5천원)</div>
                                    <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.4;">주식으로 안 바꾸고 <strong>원금 1억 + 이자</strong>만 받음. (손실 방어, 안전성 확보)</p>
                                </div>
                            </div>
                            <!-- 주가 상승 시 -->
                            <div style="background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius-md); padding:1rem 1.2rem; display:flex; gap:1rem; align-items:center;">
                                <div style="font-size:1.8rem;">🚀</div>
                                <div>
                                    <div style="font-weight:700; color:var(--color-green); font-size:0.9rem; margin-bottom:4px;">A기업 주가 폭등 (3만원)</div>
                                    <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.4;">대박 기회! 원금 대신 <strong>주식(1만원 단가)으로 1만주(3억 가치) </strong> 받아서 팔아치움! (전환권 행사)</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 기존 주주 영향 -->
                    <div style="margin-top:1.5rem; background:#fff; border-left:4px solid var(--color-red); padding:1rem 1.5rem; font-size:0.9rem; color:var(--text-secondary);">
                        <strong style="color:var(--text-primary);">⚠️ 기존 주주에게 미치는 영향 (악재):</strong> 
                        주가가 올라서 B투자자가 주식으로 전환하면, <strong>새로운 1만주(신주)가 허공에서 찍혀 나옵니다.</strong> 전체 주식 빵(파이) 조각이 늘어나 기존 주주의 1주당 가치가 희석되므로 주가 하락의 원인이 됩니다.
                    </div>
                </div>
            </section>

            <section id="p2-2">
                <h3>2. BW (Bond with Warrant, 신주인수권부사채)</h3>
                <p style="color:var(--text-secondary); margin-bottom:1.5rem;">원금과 이자는 그대로 채권으로 돌려받고, 추가로 <strong>'신주를 싸게 살 수 있는 쿠폰(Warrant)'</strong>을 끼워주는 사채입니다. (채권과 쿠폰은 <strong>분리</strong>됩니다!)</p>

                <div style="background:#f8f9fa; border:1px solid #e2e8f0; border-radius:var(--radius-lg); padding:2rem;">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:1.5rem;">
                        <span style="background:#8b5cf6; color:#fff; font-size:0.8rem; font-weight:700; padding:4px 10px; border-radius:20px;">시나리오</span>
                        <strong style="color:var(--text-primary); font-size:1.1rem;">A기업과 B투자자의 쿠폰 거래 방식</strong>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:1.5rem; align-items:stretch;">
                        <!-- 투자 시점 -->
                        <div style="background:#fff; border:1px solid #cbd5e1; border-radius:var(--radius-md); padding:1.5rem; text-align:center; box-shadow:var(--shadow-sm);">
                            <div style="font-weight:800; color:var(--text-primary); margin-bottom:1rem; font-size:1.1rem;">[ 투자 시점 ]</div>
                            <div style="font-size:2.5rem; margin-bottom:0.5rem;">🎫</div>
                            <p style="font-size:0.95rem; color:var(--text-secondary); word-break:keep-all; line-height:1.5; margin:0;">
                                B투자자가 A기업에 <strong>1억 원을 대출</strong>해줌.<br>A기업은 이자와 함께 <strong>"나중에 우리 주식 1만원에 살 수 있는 쿠폰 1만장"</strong>을 덤으로 줌.
                            </p>
                        </div>
                        
                        <!-- 화살표 -->
                        <div style="display:flex; flex-direction:column; justify-content:center; color:#94a3b8; font-size:1.5rem;">
                            ➔
                        </div>

                        <!-- 1년 후 결과 -->
                        <div style="display:flex; flex-direction:column; justify-content:center; gap:1rem;">
                            <!-- 원금 회수 (기본) -->
                            <div style="background:#fff; border:2px dashed #94a3b8; border-radius:var(--radius-md); padding:1rem 1.2rem; display:flex; gap:1rem; align-items:center;">
                                <div style="font-size:1.8rem;">💰</div>
                                <div>
                                    <div style="font-weight:700; color:var(--text-primary); font-size:0.95rem; margin-bottom:4px;">사채 본연의 기능 (기본)</div>
                                    <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.4;">주가 변동과 <strong>상관없이</strong> 빌려준 1억 원 + 이자는 돌려받음.</p>
                                </div>
                            </div>
                            <!-- 쿠폰 행사 (주가 3만원 폭등 시) -->
                            <div style="background:#f3e8ff; border:1px solid #d8b4fe; border-radius:var(--radius-md); padding:1rem 1.2rem; display:flex; gap:1rem; align-items:center;">
                                <div style="font-size:1.8rem;">🎁</div>
                                <div>
                                    <div style="font-weight:700; color:#7e22ce; font-size:0.95rem; margin-bottom:4px;">쿠폰 행사 (Warrant)</div>
                                    <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.4;">주가가 3만원이 됨. 쿠폰을 써서 <strong>내 돈을 1억 더 내고!</strong> 새 주식 1만주를 1만원에 삼 (총 2억차익).</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- CB와의 핵심 차이 요약 -->
                    <div style="margin-top:1.5rem; align-items:flex-start; background:#fff; border:1px solid #cbd5e1; border-radius:var(--radius-md); padding:1rem 1.5rem; display:flex; gap:1rem;">
                        <span style="font-size:1.5rem;">⚖️</span>
                        <div>
                            <strong style="color:var(--text-primary); font-size:0.95rem; display:block; margin-bottom:6px;">핵심 차이 요약 (CB vs BW)</strong>
                            <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.5;">
                                <strong>CB(전환사채)</strong>는 주식으로 바꾸면 채권(빚)이 사라지고 회사는 돈을 갚을 필요가 없어집니다. (돈이 주식으로 변환)<br>
                                <strong>BW(신주인수권부사채)</strong>는 채권은 그대로 살아있어 회사가 돈을 다시 갚아야 하며, 투자자가 쿠폰(신주인수권)을 행사하려면 회사의 <strong>새 주식을 살 돈(현금)을 추가로 더 내야 합니다.</strong>
                            </p>
                        </div>
                    </div>
                </div>
            </section>

            <details class="accordion" id="p2-deep" open>

                    <h4 style="text-align:center; color:var(--text-secondary); margin-top:0; margin-bottom:2rem; font-size:1.15rem; letter-spacing:-0.5px;">[핵심 금리 연산 및 관계식]</h4>
                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:1.5rem;">
                        
                        <!-- 연산 1: 실질금리 -->
                        <div style="background:#e8f3ff; border:1px solid #bfdbfe; padding:1.8rem; border-radius:var(--radius-md);">
                            <div style="font-size:0.95rem; color:var(--color-blue); font-weight:800; margin-bottom:0.8rem;">1. 실제 자산 가치 변동률</div>
                            <div style="font-size:1.4rem; font-weight:800; color:var(--text-primary); margin-bottom:1rem; word-break:keep-all; line-height:1.4;">
                                실질금리 = <br><span style="color:var(--color-blue);">명목금리 - 물가상승률</span>
                            </div>
                            <p style="margin:0; font-size:0.95rem; color:var(--text-secondary); line-height:1.5;">명목금리가 표면상 제시된 이자율이라면, 실질금리는 이를 인플레이션으로 보정한 진짜 가치입니다. 은행 예금(명목)이 3%일 때 인플레이션이 5%라면, 돈을 안 쓰고 예금에 넣어둬도 <strong>매년 2%씩 구매력이 증발</strong>하고 있는 것입니다.</p>
                        </div>

                        <!-- 연산 2: 대출금리 -->
                        <div style="background:#fff0f0; border:1px solid #fecaca; padding:1.8rem; border-radius:var(--radius-md);">
                            <div style="font-size:0.95rem; color:var(--color-red); font-weight:800; margin-bottom:0.8rem;">2. 대출 이자 산정의 원리</div>
                            <div style="font-size:1.4rem; font-weight:800; color:var(--text-primary); margin-bottom:1rem; word-break:keep-all; line-height:1.4;">
                                대출금리 = <br><span style="color:var(--color-red);">기준금리(CD/코픽스) + 가산금리</span>
                            </div>
                            <p style="margin:0; font-size:0.95rem; color:var(--text-secondary); line-height:1.5;">가산금리(Spread)는 차주의 <strong>신용도 및 대출 위험 프리미엄</strong>을 뜻합니다. 경제 위기가 오면 중앙은행이 기준금리를 0%로 낮춰도 은행들의 부실 우려로 인해 가산금리가 폭등하므로, 실제 서민 대출 금리는 더 오를 수 있습니다.</p>
                        </div>
                        
                    </div>

                    <!-- 3. COFIX 설명 (신규 추가) -->
                    <div style="margin-top:2rem; background:#f3f4f6; border-left:4px solid #6b7280; padding:1.5rem; border-radius:0 var(--radius-md) var(--radius-md) 0;">
                        <div style="font-size:1rem; color:#374151; font-weight:800; margin-bottom:0.5rem; display:flex; align-items:center; gap:8px;">
                            <span style="display:inline-block; background:#6b7280; color:#fff; border-radius:4px; padding:2px 8px; font-size:0.8rem;">용어 사전</span>
                            COFIX (자금조달비용지수)
                        </div>
                        <p style="margin:0; font-size:0.95rem; color:var(--text-secondary); line-height:1.6;">
                            국내 주요 시중은행들이 예금, 적금, 은행채 등 자금을 조달할 때 실제로 지불한 <strong style="color:var(--text-primary);">평균 이자율(비용)</strong>입니다. 
                            은행이 돈을 원가에 떼어오는 '도매가격'이라고 볼 수 있으며, 오늘날 대부분의 <strong>변동금리 주택담보대출 및 전세자금대출의 기준이 되는 가장 중요한 실생활 지표</strong>입니다. (코픽스가 오르면 내 대출 이자도 오릅니다.)
                        </p>
                    </div>
                </div>
            </section>

            <section id="p3-2">
                <h3>2. 엔 캐리 트레이드 (Yen Carry Trade)와 그 청산의 파급력</h3>
                <p style="color:var(--text-secondary); margin-bottom:1.5rem;">글로벌 금융 시장에 막대한 '값싼 돈(유동성)'을 공급해 온 핵심 파이프라인. 헤지펀드들이 가장 애용하는 <strong>'가장 안전하고 저렴한 레버리지'</strong> 기법입니다.</p>
                
                <div style="background:#f8f9fa; border:1px solid #e2e8f0; border-radius:var(--radius-lg); padding:2rem; margin-bottom:2rem;">
                    
                    <strong style="color:var(--text-primary); font-size:1.1rem; display:block; margin-bottom:1.5rem;">⚙️ 엔 캐리 트레이드의 작동 원리 (금리 차익 먹기)</strong>
                    <div style="display:grid; grid-template-columns:1fr auto 1fr auto 1fr; gap:1rem; align-items:center;">
                        
                        <!-- 1단계: 빌리기 -->
                        <div style="background:#fff; border:1px solid #cbd5e1; border-radius:var(--radius-md); padding:1.2rem; text-align:center; box-shadow:var(--shadow-sm);">
                            <div style="font-size:2rem; margin-bottom:0.5rem;">🇯🇵</div>
                            <div style="font-weight:800; color:var(--text-primary); font-size:1rem; margin-bottom:4px;">1. 엔화 차입</div>
                            <p style="font-size:0.85rem; color:var(--text-secondary); margin:0; line-height:1.4;">일본 은행에서 <strong>단 0%대(초저금리)</strong>로 엔화를 잔뜩 빌림 (조달 비용 거의 0).</p>
                        </div>
                        
                        <div style="color:#94a3b8; font-size:1.5rem; font-weight:bold;">➔</div>

                        <!-- 2단계: 환전 -->
                        <div style="background:#fff; border:1px dashed #3b82f6; border-radius:var(--radius-md); padding:1.2rem; text-align:center;">
                            <div style="font-size:2rem; margin-bottom:0.5rem;">💱</div>
                            <div style="font-weight:800; color:#3b82f6; font-size:1rem; margin-bottom:4px;">2. 통화 환전</div>
                            <p style="font-size:0.85rem; color:var(--text-secondary); margin:0; line-height:1.4;">빌린 엔화를 즉시 글로벌 기축 통화인 <strong>달러($)</strong>로 모두 바꿈.</p>
                        </div>

                        <div style="color:#94a3b8; font-size:1.5rem; font-weight:bold;">➔</div>

                        <!-- 3단계: 투자 -->
                        <div style="background:#fff; border:1px solid #cbd5e1; border-radius:var(--radius-md); padding:1.2rem; text-align:center; box-shadow:var(--shadow-sm);">
                            <div style="font-size:2rem; margin-bottom:0.5rem;">🇺🇸</div>
                            <div style="font-weight:800; color:var(--text-primary); font-size:1rem; margin-bottom:4px;">3. 고수익 투자</div>
                            <p style="font-size:0.85rem; color:var(--text-secondary); margin:0; line-height:1.4;">미국 국채(4~5%), 미 빅테크 주식 등 <strong>금리/수익률이 높은 자산</strong>에 투자함.</p>
                        </div>
                    </div>
                </div>
            </section>

            <details class="accordion" id="p3-deep" open>
                <summary>심화: 글로벌 증시의 뇌관, 엔 캐리 트레이드 청산 (Unwinding)</summary>
                <div class="accordion-content">
                    <p style="color:var(--text-secondary); margin-bottom:1.5rem;">투자를 멈추고 <strong>판을 엎는 것</strong>입니다. 투자했던 해외 자산을 팔아 달러를 다시 엔화로 바꾼 뒤, 일본 은행에 빌린 돈을 갚아버립니다. 이 과정에서 시장의 돈이 급격히 증발합니다.</p>
                    
                    <div style="display:flex; flex-direction:column; gap:1.5rem;">
                        
                        <!-- 청산의 트리거 -->
                        <div style="background:#fff; border:1px solid #fecaca; border-left:4px solid var(--color-red); border-radius:var(--radius-md); padding:1.5rem;">
                            <h4 style="margin-top:0; color:var(--color-red); font-size:1rem; display:flex; align-items:center; gap:8px;">
                                <span>🚨</span> 청산의 3대 트리거 (왜 갑자기 돈을 갚을까?)
                            </h4>
                            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:1rem; margin-top:1rem;">
                                <div style="background:#fff0f0; padding:1rem; border-radius:8px; display:flex; gap:12px; align-items:flex-start;">
                                    <div style="font-size:1.5rem;">🏦</div>
                                    <div><strong style="font-size:0.9rem; color:var(--text-primary);">일본 기준금리 인상</strong><br><span style="font-size:0.85rem; color:var(--text-secondary);">이자 부담이 커져 수익률 훼손</span></div>
                                </div>
                                <div style="background:#fff0f0; padding:1rem; border-radius:8px; display:flex; gap:12px; align-items:flex-start;">
                                    <div style="font-size:1.5rem;">🦅</div>
                                    <div><strong style="font-size:0.9rem; color:var(--text-primary);">미국 기준금리 인하</strong><br><span style="font-size:0.85rem; color:var(--text-secondary);">양국 간 금리차(Spread) 이점 감소</span></div>
                                </div>
                                <div style="background:#fff0f0; padding:1rem; border-radius:8px; display:flex; gap:12px; align-items:flex-start;">
                                    <div style="font-size:1.5rem;">🌍</div>
                                    <div><strong style="font-size:0.9rem; color:var(--text-primary);">글로벌 위기 발생</strong><br><span style="font-size:0.85rem; color:var(--text-secondary);">위험자산 회피, 안전자산(엔화) 선호</span></div>
                                </div>
                            </div>
                        </div>

                        <!-- 시장에 미치는 영향 (밝은 테마로 변경) -->
                        <div style="background:#fef3c7; border:1px solid #fde68a; padding:1.5rem; border-radius:var(--radius-md); color:var(--text-primary);">
                            <h4 style="margin-top:0; color:#b45309; font-size:1rem; display:flex; align-items:center; gap:8px;">
                                <span>⚡</span> 글로벌 금융시장 발작 현상 (연쇄 충격)
                            </h4>
                            <ul style="margin:0; padding-left:1.5rem; margin-top:1rem; display:flex; flex-direction:column; gap:12px;">
                                <li style="font-size:0.95rem; line-height:1.5;">
                                    <strong style="color:var(--color-red);">글로벌 자산 투매:</strong> 급하게 일본 은행에 빚을 갚으려면 투자했던 자산을 전부 팔아야 함. 이로 인해 <strong>미국 빅테크 주식 및 국채 시장의 갑작스러운 대폭락</strong> 유발.
                                </li>
                                <li style="font-size:0.95rem; line-height:1.5;">
                                    <strong style="color:#2563eb;">환율 요동 (엔화 폭등):</strong> 판 주식으로 받은 엄청난 양의 달러를 다시 엔화로 급하게 다구니 환전수요가 몰려 단기적으로 <strong>엔화 가치가 비정상적으로 폭등(엔고)</strong>함.
                                </li>
                                <li style="font-size:0.95rem; line-height:1.5;">
                                    <strong style="color:#475569;">유동성 증발:</strong> 글로벌 증시를 부양하던 막대한 '값싼 일본 돈'이 순식간에 회수되어 전 세계적인 돈 가뭄(유동성 경색) 현상 초래.
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </details>

            <section id="p3-3">
                <h3>3. 일본 버블 경제의 형성 (1980년대)</h3>
                <p style="color:var(--text-secondary); margin-bottom:1.5rem;">미국의 극단적인 고금리 정책에서 출발한 나비효과가 일본의 구조적 거품을 만들어낸 역사적 과정입니다.</p>

                <div style="background:#f8f9fa; border:1px solid #e2e8f0; border-radius:var(--radius-lg); padding:2rem; margin-bottom:2rem;">
                    
                    <strong style="color:var(--text-primary); font-size:1.1rem; display:block; margin-bottom:1.5rem;">📈 버블 형성 프로세스 타임라인</strong>
                    
                    <div style="display:flex; flex-direction:column; gap:1rem; position:relative;">
                        <!-- 타임라인 중앙선 -->
                        <div style="position:absolute; width:2px; height:caLc(100% - 20px); background:#cbd5e1; left:20px; top:10px; z-index:0;"></div>

                        <!-- Step 1: 미국의 위기 (1980s 초반) -->
                        <div style="position:relative; z-index:1; display:flex; gap:1.5rem; align-items:flex-start;">
                            <div style="width:40px; height:40px; border-radius:50%; background:#fff; border:2px solid var(--color-blue); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; color:var(--color-blue); box-shadow:0 2px 5px rgba(0,0,0,0.1);">1</div>
                            <div style="background:#fff; border:1px solid #cbd5e1; border-radius:var(--radius-md); padding:1.2rem; flex:1; box-shadow:var(--shadow-sm);">
                                <strong style="color:var(--color-blue); font-size:0.95rem; display:block; margin-bottom:4px;">1980년대 초반: 미국의 '슈퍼 달러' 부작용</strong>
                                <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.5;">
                                    미국의 초고금리(20%) 정책으로 '슈퍼 달러' 시대가 옴. 달러가 너무 비싸져 미국 기업들이 수출경쟁력을 상실하고 무역적자가 사상 최대(1,220억 달러)에 달함. 반면 <strong>일본은 값싼 엔화를 바탕으로 미국 수출 시장을 싹쓸이함.</strong>
                                </p>
                            </div>
                        </div>

                        <!-- Step 2: 플라자 합의 (1985) -->
                        <div style="position:relative; z-index:1; display:flex; gap:1.5rem; align-items:flex-start;">
                            <div style="width:40px; height:40px; border-radius:50%; background:#fff; border:2px solid var(--color-red); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; color:var(--color-red); box-shadow:0 2px 5px rgba(0,0,0,0.1);">2</div>
                            <div style="background:#fffcfc; border:1px solid #fecaca; border-radius:var(--radius-md); padding:1.2rem; flex:1; box-shadow:var(--shadow-sm);">
                                <strong style="color:var(--color-red); font-size:0.95rem; display:block; margin-bottom:4px;">1985년 9월: 플라자 합의 (강압적 환율 조정)</strong>
                                <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); line-height:1.5;">
                                    위기감을 느낀 미국이 G5를 소집, <strong>"일본 엔화 가치를 당장 2배 올려!(달러 약세 유도)"</strong>라고 강압적 합의 도출. 환율이 250엔에서 120엔대로 폭락하며 <strong>일본 수출 기업들은 환율로 인한 채산성 악화의 치명타</strong>를 맞음.
                                </p>
                            </div>
                        </div>

                        <!-- Step 3: 유동성 팽창 (버블) -->
                        <div style="position:relative; z-index:1; display:flex; gap:1.5rem; align-items:flex-start;">
                            <div style="width:40px; height:40px; border-radius:50%; background:#fff; border:2px solid var(--color-green); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:800; color:var(--color-green); box-shadow:0 2px 5px rgba(0,0,0,0.1);">3</div>
                            <div style="background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius-md); padding:1.2rem; flex:1; box-shadow:var(--shadow-sm);">
                                <strong style="color:var(--color-green); font-size:0.95rem; display:block; margin-bottom:4px;">1980년대 후반: 유동성 폭탄과 자산 거품의 극치</strong>
                                <div style="font-size:0.85rem; color:var(--text-secondary); line-height:1.5; margin-top:0.5rem;">
                                    <strong>수출 타격을 만회하기 위해 일본은행(BOJ)이 1년 만에 금리를 반토막(5%→2.5%) 냄.</strong> 시장에 천문학적인 돈이 풀리며 진풍경 발생:
                                    <ul style="margin:8px 0 0 0; padding-left:1.2rem;">
                                        <li><strong>기업들:</strong> 싼 이자로 돈 빌려 본업 대신 주식/부동산에 투자하는 <strong>'자이테크(재테크)' 광풍</strong> 불어닥침.</li>
                                        <li><strong>주식 폭등:</strong> '85년 말 1.3만pt 닛케이 주가가 4년 만에 약 3배 뛰어 38,915pt 달성.</li>
                                        <li><strong>부동산 폭등:</strong> 6대 상업 도시 지가 3~4배 수직 상승. <strong>"도쿄 땅을 다 팔면 미국 땅 전체를 4번 살 수 있다"</strong>는 극도의 자산 버블 팽창.</li>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem; margin-top:1rem;">

                </div>
            </section>

            <section id="p3-4">
                <h3>4. 버블의 붕괴와 막대한 부채</h3>
                <p style="color:var(--text-secondary); margin-bottom:1.5rem;">끝을 모르고 치솟던 자산 가격은 정부의 급격한 정책 선회와 함께 단숨에 붕괴해버렸습니다.</p>

                <div style="display:flex; flex-direction:column; gap:1.5rem; margin-bottom:2rem; background:#f8f9fa; border:1px solid #e2e8f0; border-radius:var(--radius-lg); padding:2rem;">
                    
                    <strong style="color:var(--text-primary); font-size:1.1rem; display:block; margin-bottom:1rem;">💥 자산 시장 산사태의 3단계</strong>
                    
                    <!-- 1. 트리거 -->
                    <div style="background:#fffcfc; border:2px solid #fca5a5; border-radius:var(--radius-lg); padding:1.5rem; position:relative;">
                        <span style="position:absolute; top:-12px; left:20px; background:#ef4444; color:#fff; font-size:0.8rem; font-weight:800; padding:4px 12px; border-radius:20px;">1단계: 정책의 급선회</span>
                        <div style="display:flex; gap:1rem; align-items:flex-start; margin-top:0.5rem;">
                            <div style="font-size:2rem;">🏦</div>

<template id="valuation-table-tpl">
<div class="comp-table-container">
        <table class="comp-table">
            <thead>
                <tr>
                    <th width="15%">지표</th>
                    <th width="20%">가치주 (Value)</th>
                    <th width="20%">성장주 (Growth)</th>
                    <th>해석</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="item in data" :key="item.metric">
                    <td style="font-weight:bold">{{ item.metric }}</td>
                    <td style="background:#f4f6f8">{{ item.value }}</td>
                    <td style="background:#e8f3ff; color:var(--color-blue); font-weight:600;">{{ item.growth }}</td>
                    <td style="color:#8b95a1; font-size:0.85rem;">{{ item.desc }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</template>

<template id="indicator-bar-tpl">
<div style="margin-top: 1rem;">
       <div style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">
           <span style="width:50px; text-align:right; font-weight:bold;">{{ bar.minLabel }}</span>
           <div :style="{flex:1, height:'12px', background: bar.gradient, borderRadius:'6px', position:'relative'}">
               <div v-if="bar.markPos !== null" :style="{position:'absolute', left: bar.markPos + '%', top:'-20px', transform:'translateX(-50%)', fontSize:'0.8rem', fontWeight:'bold'}">{{ bar.markLabel }}</div>
           </div>
           <span style="width:50px; font-weight:bold;">{{ bar.maxLabel }}</span>
       </div>
       <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:0.8rem; color:var(--text-tertiary);">
           <span v-html="bar.infoLeft"></span>
           <span v-html="bar.infoRight"></span>
       </div>
    </div>
</template>

<template id="scenario-box-tpl">
<div class="scenario-box" v-if="data">
        <div class="scenario-card">
            <div class="scenario-label">1주당 가격</div>
            <div class="scenario-val">{{ formatNum(data.before.price) }}원</div>
            <div class="scenario-arrow">↓</div>
            <div :class="['scenario-val', pColor]">{{ formatNum(data.after.price) }}원</div>
            <div :class="['scenario-change', pColor]">({{ deltaPrice }}%)</div>
        </div>
        <div class="scenario-card" style="background:#fafafa;">
            <div class="scenario-label">내 평가금액 (김철수)</div>
            <div class="scenario-val">{{ formatNum(data.before.myVal) }}원</div>
            <div class="scenario-arrow">→</div>
            <div :class="['scenario-val', vColor]">{{ formatNum(data.after.myVal) }}원</div>
            <div :class="['scenario-change', vColor]">({{ vSign }}{{ deltaVal }}%)</div>
        </div>
    </div>
</template>

<template id="svg-chart-tpl">
<div class="chart-container">
        <svg viewBox="0 0 300 150" class="chart">
            <polyline :points="pointsStr" fill="none" :stroke="color" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <template v-for="(circle, i) in circles" :key="i">
                 <circle :cx="circle.x" :cy="circle.y" r="3" fill="#fff" :stroke="color" stroke-width="2"/>
                 <text :x="circle.x" :y="circle.y - 10" text-anchor="middle" class="chart-text" :style="{fontWeight:'bold', fill: color}">{{ formatNum(circle.val) }}</text>
                 <text :x="circle.x" :y="145" text-anchor="middle" class="chart-text">{{ circle.year }}</text>
            </template>
        </svg>
    </div>
</template>
